<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>👗 プリンセスきせかえ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');

:root {
  --pink: #FF8FAB;
  --pink-light: #FFD6E0;
  --pink-pale: #FFF0F5;
  --lavender: #C9A7E8;
  --lavender-light: #EFE3FA;
  --gold: #FFD700;
  --white: #FFFFFF;
  --text-dark: #6D3A5A;
  --text-mid: #A05A7A;
  --bg: linear-gradient(160deg, #FFD6E0 0%, #EFE3FA 50%, #D6EDFF 100%);
  --tab-h: 52px;
  --item-size: 80px;
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }

html,body {
  height:100%; height:100dvh;
  font-family:'Zen Maru Gothic',sans-serif;
  background:var(--bg);
  overflow:hidden;
}

/* ── LAYOUT ── */
#app {
  display:flex; flex-direction:column;
  height:100dvh;
  max-width:430px; margin:0 auto;
  position:relative;
}

/* ── TOP BAR ── */
#topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px 8px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(8px);
  border-bottom:1.5px solid rgba(255,143,171,0.25);
  flex-shrink:0; gap:8px;
  z-index:20;
}
#backBtn {
  background:linear-gradient(135deg,#FF8FAB,#C9A7E8);
  color:white; border:none; border-radius:24px;
  padding:8px 16px; font-family:inherit; font-size:13px; font-weight:900;
  cursor:pointer; white-space:nowrap;
  box-shadow:0 3px 10px rgba(255,143,171,0.45);
  letter-spacing:1px;
}
#topTitle {
  font-size:16px; font-weight:900; color:var(--text-dark);
  text-align:center; flex:1; letter-spacing:1px;
}
#saveBtn {
  background:linear-gradient(135deg,var(--gold),#FFB347);
  color:#5A3000; border:none; border-radius:24px;
  padding:8px 14px; font-family:inherit; font-size:12px; font-weight:900;
  cursor:pointer; white-space:nowrap;
  box-shadow:0 3px 10px rgba(255,215,0,0.45);
  letter-spacing:1px;
}
#backBtn:active, #saveBtn:active { transform:scale(0.92); }

/* ── STAGE ── */
#stage {
  flex:1; position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  min-height:0;
}

/* 背景 */
#stageBg {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 40%, rgba(255,214,224,0.7) 0%, transparent 60%),
    linear-gradient(180deg, #EFE3FA 0%, #FFD6E0 50%, #FFECD6 100%);
}
#stageBg::before {
  content:''; position:absolute; inset:0;
  background:
    radial-gradient(circle at 20% 80%, rgba(255,215,0,0.12) 0%, transparent 40%),
    radial-gradient(circle at 80% 20%, rgba(201,167,232,0.2) 0%, transparent 40%);
}

/* stage canvas wrapper */
#stageCanvas {
  position:relative; z-index:2;
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
}

/* 舞台装飾 */
.deco-star {
  position:absolute; font-size:18px; opacity:0.4;
  animation:twinkle 2.5s ease-in-out infinite;
  pointer-events:none;
}
@keyframes twinkle {
  0%,100%{opacity:0.2;transform:scale(0.8)rotate(0deg);}
  50%{opacity:0.7;transform:scale(1.2)rotate(15deg);}
}

/* ── CHARACTER SVG CONTAINER ── */
#charContainer {
  position:relative;
  width:200px; height:340px;
  flex-shrink:0;
}
#charContainer svg { width:100%; height:100%; overflow:visible; }

/* 装着中アイテム */
.wear-layer {
  position:absolute; inset:0;
  pointer-events:none;
  display:flex; align-items:center; justify-content:center;
}
.wear-emoji {
  position:absolute;
  font-size:var(--sz,40px);
  line-height:1;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s;
  filter:drop-shadow(0 3px 8px rgba(0,0,0,0.15));
  pointer-events:none;
}
.wear-emoji.pop {
  animation:wearPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes wearPop {
  0%{transform:scale(0) rotate(-20deg);}
  60%{transform:scale(1.25) rotate(5deg);}
  100%{transform:scale(1) rotate(0deg);}
}

/* ── TABS ── */
#tabs {
  display:flex; border-bottom:2px solid rgba(255,143,171,0.2);
  background:rgba(255,255,255,0.75); backdrop-filter:blur(6px);
  flex-shrink:0; z-index:10;
}
.tab-btn {
  flex:1; height:var(--tab-h);
  border:none; background:transparent;
  font-family:inherit; font-size:11px; font-weight:900;
  color:var(--text-mid); cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:2px; position:relative; transition:color 0.2s;
  letter-spacing:0.5px;
}
.tab-btn .tab-emoji { font-size:20px; line-height:1; }
.tab-btn.active { color:var(--text-dark); }
.tab-btn.active::after {
  content:''; position:absolute; bottom:-2px; left:0; right:0;
  height:3px; border-radius:2px 2px 0 0;
  background:linear-gradient(90deg,var(--pink),var(--lavender));
}
.tab-btn:active { transform:scale(0.92); }

/* ── ITEM PANEL ── */
#panel {
  background:rgba(255,255,255,0.85); backdrop-filter:blur(6px);
  overflow-x:auto; overflow-y:hidden;
  flex-shrink:0; padding:12px 10px;
  scrollbar-width:none;
}
#panel::-webkit-scrollbar { display:none; }

.items-row {
  display:flex; gap:10px;
  width:max-content; padding:2px 4px;
}

.item-btn {
  width:var(--item-size); height:var(--item-size);
  border-radius:22px;
  border:3px solid rgba(255,143,171,0.2);
  background:white;
  display:flex; align-items:center; justify-content:center;
  font-size:38px; line-height:1;
  cursor:pointer; transition:transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  box-shadow:0 4px 12px rgba(255,143,171,0.2);
  position:relative; flex-shrink:0;
  -webkit-user-select:none; user-select:none;
}
.item-btn:active { transform:scale(0.88); }
.item-btn.selected {
  border-color:var(--pink);
  box-shadow:0 0 0 3px rgba(255,143,171,0.35), 0 6px 16px rgba(255,143,171,0.3);
  background:var(--pink-pale);
}
.item-btn.selected::after {
  content:'✓'; position:absolute; top:3px; right:5px;
  font-size:12px; color:var(--pink); font-weight:900;
}
/* 「なし」ボタン */
.item-btn.none-btn {
  border-style:dashed; border-color:rgba(160,90,122,0.3);
  color:var(--text-mid); font-size:13px; font-weight:900;
  letter-spacing:0.5px;
}

/* ── SPARKLE OVERLAY ── */
#sparkleLayer {
  position:fixed; inset:0; pointer-events:none; z-index:9999;
  overflow:hidden;
}
.sp { position:absolute; animation:spFloat 1.1s ease-out forwards; opacity:0; font-size:20px; }
@keyframes spFloat {
  0%{opacity:1;transform:translate(0,0) scale(0.5);}
  60%{opacity:1;transform:translate(var(--tx),var(--ty)) scale(1.3);}
  100%{opacity:0;transform:translate(var(--tx2),var(--ty2)) scale(0.2);}
}

/* ── CLEAR MODAL ── */
#clearModal {
  position:fixed; inset:0; z-index:2000;
  display:none; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(255,182,193,0.4); backdrop-filter:blur(4px);
}
#clearModal.show { display:flex; }
#clearBox {
  background:white; border-radius:36px; padding:36px 28px;
  text-align:center; max-width:300px; width:88%;
  box-shadow:0 20px 60px rgba(255,143,171,0.5);
  animation:modalPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes modalPop {
  from{transform:scale(0.5) rotate(-5deg);opacity:0;}
  to{transform:scale(1) rotate(0deg);opacity:1;}
}
#clearBox .big-emoji { font-size:72px; display:block; margin-bottom:12px; animation:float 2s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
#clearBox h2 { font-size:24px; font-weight:900; color:var(--text-dark); margin-bottom:8px; }
#clearBox p { font-size:15px; color:var(--text-mid); font-weight:700; margin-bottom:20px; }
#clearCloseBtn {
  background:linear-gradient(135deg,#FF8FAB,#C9A7E8); color:white;
  border:none; border-radius:28px; padding:14px 32px;
  font-family:inherit; font-size:16px; font-weight:900; cursor:pointer;
  box-shadow:0 6px 20px rgba(255,143,171,0.45); letter-spacing:1px;
}
#clearCloseBtn:active { transform:scale(0.93); }

/* 紙吹雪 */
.confetti { position:fixed; pointer-events:none; z-index:1999; border-radius:3px; animation:confettiFall linear forwards; }
@keyframes confettiFall {
  0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0.5;}
}

/* ── SAVE TOAST ── */
#toast {
  position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(30px);
  background:linear-gradient(135deg,var(--gold),#FFB347); color:#5A3000;
  font-family:inherit; font-size:14px; font-weight:900;
  padding:12px 24px; border-radius:28px;
  box-shadow:0 6px 20px rgba(255,215,0,0.5);
  opacity:0; transition:all 0.3s; z-index:3000; white-space:nowrap;
  pointer-events:none; letter-spacing:1px;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <button id="backBtn" onclick="location.href='../index.html'">🏠 もどる</button>
    <div id="topTitle">👗 きせかえ</div>
    <button id="saveBtn" id="saveBtn">📸 ほぞん</button>

    <div id="stageCanvas">

      <span class="tab-emoji">👗</span>ドレス

    <button class="tab-btn" data-cat="crown" onclick="switchTab('crown')">
      <span class="tab-emoji">👑</span>かんむり

  <!-- ITEM PANEL -->

    <div class="items-row" id="itemsRow"></div>

</div><!-- #app -->

    <button id="clearCloseBtn" onclick="closeModal()">またあそぶ！</button>
  </div>
</div>

    { id:'h1', e:'🌷', label:'チューリップ', pos:{l:'30%',t:'3%'},  sz:'44px' },
    { id:'h2', e:'🌸', label:'さくら',      pos:{l:'30%',t:'3%'},  sz:'48px' },
    { id:'h3', e:'🎀', label:'リボン2',     pos:{l:'70%',t:'4%'},  sz:'52px' },
    { id:'h4', e:'⭐', label:'ほし',        pos:{l:'70%',t:'4%'},  sz:'44px' },
    { id:'h5', e:'🌈', label:'レインボー',  pos:{l:'50%',t:'1%'},  sz:'70px' },
  ],
};

/* 現在の選択 */
const sel = { dress:'d0', crown:'c0', shoes:'s0', acc:'a0', hair:'h0' };

let curTab = 'dress';

/* ═══════════════════════════════════════════
   TAB
═══════════════════════════════════════════ */
function switchTab(cat) {
  curTab = cat;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  renderPanel(cat);
}

function renderPanel(cat) {
  const row = document.getElementById('itemsRow');
  row.innerHTML = '';
  ITEMS[cat].forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'item-btn' + (item.e === '' ? ' none-btn' : '') + (sel[cat] === item.id ? ' selected' : '');
    btn.innerHTML = item.e || 'なし';
    btn.setAttribute('aria-label', item.label);
    btn.addEventListener('click', () => selectItem(cat, item));
    row.appendChild(btn);
  });
  // 選択中のアイテムへスクロール
  const selectedBtn = row.querySelector('.selected');
  if (selectedBtn) selectedBtn.scrollIntoView({inline:'center', behavior:'smooth'});
}

/* ═══════════════════════════════════════════
   SELECT ITEM
═══════════════════════════════════════════ */
function selectItem(cat, item) {
  sel[cat] = item.id;

  /* パネル更新 */
  renderPanel(cat);

  /* キャラクター更新 */
  renderWear();

  /* エフェクト */
  spawnSparkles(window.innerWidth/2, window.innerHeight*0.4);
  playSound(440 + Math.random()*200);

  /* 全部着たかチェック */
  checkAllDressed();
}

/* ═══════════════════════════════════════════
   RENDER WEAR
═══════════════════════════════════════════ */
function renderWear() {
  const layer = document.getElementById('wearLayer');
  layer.innerHTML = '';

  Object.entries(sel).forEach(([cat, id]) => {
    const item = ITEMS[cat].find(i => i.id === id);
    if (!item || !item.e) return;

    const el = document.createElement('div');
    el.className = 'wear-emoji pop';
    el.textContent = item.e;
    el.style.cssText = `
      left:${item.pos.l}; top:${item.pos.t};
      --sz:${item.sz};
      font-size:${item.sz};
      transform:translate(-50%,-50%);
    `;
    layer.appendChild(el);
    /* アニメーションを次フレームで除去 */
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.remove('pop')));
  });
}

/* ═══════════════════════════════════════════
   CHECK ALL DRESSED
═══════════════════════════════════════════ */
let clearShown = false;
function checkAllDressed() {
  const allSet = Object.entries(sel).every(([cat, id]) => id !== cat[0]+'0');
  if (allSet && !clearShown) {
    clearShown = true;
    setTimeout(() => showClear(), 600);
  }
}

function showClear() {
  launchConfetti();
  document.getElementById('clearModal').classList.add('show');
}
function closeModal() {
  document.getElementById('clearModal').classList.remove('show');
  clearShown = false;
}

/* ═══════════════════════════════════════════
   CONFETTI
═══════════════════════════════════════════ */
function launchConfetti() {
  const colors = ['#FF8FAB','#C9A7E8','#FFD700','#B8F0D8','#FF6CA0','#87CEEB'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    const size = 6 + Math.random()*8;
    el.style.cssText = `
      left:${Math.random()*100}vw;
      top:-20px;
      width:${size}px; height:${size*1.6}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${2+Math.random()*2}s;
      animation-delay:${Math.random()*0.8}s;
      transform:rotate(${Math.random()*360}deg);
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

/* ═══════════════════════════════════════════
   SPARKLES
═══════════════════════════════════════════ */
const spLayer = document.getElementById('sparkleLayer');
const EMO = ['✨','💖','⭐','🌟','💫','🌸','💕','🎀'];
function spawnSparkles(x, y, count=7) {
  for (let i = 0; i < count; i++) {
    const el = document.createElement('span');
    el.className = 'sp';
    const angle = (360/count)*i + Math.random()*25;
    const r1 = 25+Math.random()*25, r2 = 60+Math.random()*50;
    const rad = angle*Math.PI/180;
    el.textContent = EMO[Math.floor(Math.random()*EMO.length)];
    el.style.cssText = `left:${x}px;top:${y}px;--tx:${Math.cos(rad)*r1}px;--ty:${Math.sin(rad)*r1}px;--tx2:${Math.cos(rad)*r2}px;--ty2:${Math.sin(rad)*r2}px;animation-delay:${Math.random()*0.1}s`;
    spLayer.appendChild(el);
    setTimeout(() => el.remove(), 1300);
  }
}

/* ═══════════════════════════════════════════
   WEB AUDIO
═══════════════════════════════════════════ */
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playSound(freq) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.3);
    osc.start(); osc.stop(ctx.currentTime+0.3);
  } catch(e){}
}

/* ═══════════════════════════════════════════
   SAVE (Canvas)
═══════════════════════════════════════════ */
document.getElementById('saveBtn').addEventListener('click', saveImage);
function saveImage() {
  const container = document.getElementById('charContainer');
  const rect = container.getBoundingClientRect();

  const canvas = document.createElement('canvas');
  const scale = 2;
  canvas.width  = rect.width  * scale;
  canvas.height = rect.height * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  /* 背景グラデーション */
  const grad = ctx.createLinearGradient(0,0,rect.width,rect.height);
  grad.addColorStop(0,'#FFD6E0'); grad.addColorStop(0.5,'#EFE3FA'); grad.addColorStop(1,'#D6EDFF');
  ctx.fillStyle = grad; ctx.fillRect(0,0,rect.width,rect.height);

  /* SVG を画像化 */
  const svgEl = document.getElementById('charSvg');
  const svgData = new XMLSerializer().serializeToString(svgEl);
  const img = new Image();
  const blob = new Blob([svgData], {type:'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);

  img.onload = () => {
    ctx.drawImage(img, 0, 0, rect.width, rect.height);
    URL.revokeObjectURL(url);

    /* 絵文字を描く */
    const emojis = document.querySelectorAll('.wear-emoji');
    emojis.forEach(em => {
      const er = em.getBoundingClientRect();
      const ex = er.left - rect.left + er.width/2;
      const ey = er.top  - rect.top  + er.height/2;
      ctx.font = em.style.fontSize + ' serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(em.textContent, ex, ey);
    });

    /* ダウンロード */
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'princess_' + Date.now() + '.png';
    a.click();

    showToast('📸 ほぞんしたよ！');
    spawnSparkles(window.innerWidth/2, window.innerHeight*0.5, 12);
  };
  img.src = url;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ── タッチフィードバック（ステージタップ） ── */
document.getElementById('stage').addEventListener('touchstart', e => {
  const touch = e.touches[0];
  spawnSparkles(touch.clientX, touch.clientY, 5);
  playSound(500 + Math.random()*300);
}, {passive:true});

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
renderPanel('dress');
renderWear();
</script>
</body>

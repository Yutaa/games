<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌸 プリンセスゲームパーク 🌸</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');

  :root {
    --pink: #FF8FAB;
    --pink-light: #FFD6E0;
    --pink-pale: #FFF0F5;
    --lavender: #C9A7E8;
    --lavender-light: #EFE3FA;
    --gold: #FFD700;
    --gold-light: #FFF4B0;
    --mint: #B8F0D8;
    --white: #FFFFFF;
    --text-dark: #6D3A5A;
    --text-mid: #A05A7A;
    --shadow-pink: 0 8px 30px rgba(255,143,171,0.35);
    --shadow-gold: 0 6px 20px rgba(255,215,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    min-height: 100dvh;
    font-family: 'Zen Maru Gothic', sans-serif;
    background: linear-gradient(160deg, #FFD6E0 0%, #EFE3FA 40%, #D6EDFF 100%);
    overflow-x: hidden;
  }

  /* 背景の装飾 */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(255,215,0,0.15) 0%, transparent 40%),
      radial-gradient(circle at 85% 70%, rgba(201,167,232,0.2) 0%, transparent 40%),
      radial-gradient(circle at 50% 90%, rgba(255,143,171,0.15) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  /* キラキラ星 */
  .stars-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    width: 6px; height: 6px;
    background: var(--gold);
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    animation: twinkle var(--dur) ease-in-out infinite var(--delay);
    opacity: 0;
  }
  @keyframes twinkle {
    0%,100% { opacity:0; transform:scale(0.5) rotate(0deg); }
    50%      { opacity:0.8; transform:scale(1.2) rotate(20deg); }
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 430px;
    margin: 0 auto;
    padding: 0 0 60px;
    min-height: 100dvh;
  }

  /* ヘッダー */
  header {
    text-align: center;
    padding: 40px 20px 20px;
  }

  .crown-icon {
    font-size: 64px;
    display: block;
    margin-bottom: 8px;
    animation: float 3s ease-in-out infinite;
    filter: drop-shadow(0 4px 12px rgba(255,215,0,0.6));
  }
  @keyframes float {
    0%,100% { transform: translateY(0) rotate(-3deg); }
    50%      { transform: translateY(-10px) rotate(3deg); }
  }

  h1 {
    font-size: 28px;
    font-weight: 900;
    color: var(--text-dark);
    text-shadow: 0 2px 0 rgba(255,255,255,0.8), 0 4px 12px rgba(255,143,171,0.4);
    line-height: 1.3;
    letter-spacing: 2px;
  }
  h1 span {
    display: block;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-mid);
    letter-spacing: 3px;
    margin-top: 4px;
  }

  /* セクションタイトル */
  .section-title {
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-mid);
    letter-spacing: 4px;
    margin: 28px 20px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-title::before, .section-title::after {
    content: '';
    flex: 1;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, var(--pink), transparent);
  }

  /* ゲームグリッド */
  .games-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 0 16px;
  }

  /* ゲームカード */
  .game-card {
    background: white;
    border-radius: 28px;
    padding: 24px 16px 20px;
    text-align: center;
    text-decoration: none;
    color: var(--text-dark);
    box-shadow: var(--shadow-pink), inset 0 1px 0 rgba(255,255,255,0.9);
    border: 2.5px solid rgba(255,143,171,0.25);
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    -webkit-user-select: none; user-select: none;
  }

  .game-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--pink), var(--lavender), var(--gold));
  }

  .game-card.pink-card  { border-color: rgba(255,143,171,0.35); }
  .game-card.purple-card { border-color: rgba(201,167,232,0.4); box-shadow: 0 8px 30px rgba(201,167,232,0.3), inset 0 1px 0 rgba(255,255,255,0.9); }
  .game-card.purple-card::before { background: linear-gradient(90deg, var(--lavender), #a78bfa, var(--pink)); }

  .game-card:active {
    transform: scale(0.93) translateY(2px);
    box-shadow: 0 4px 12px rgba(255,143,171,0.25);
  }

  /* バウンス演出 */
  .game-card.bounce {
    animation: cardBounce 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes cardBounce {
    0%   { transform: scale(1); }
    50%  { transform: scale(0.92); }
    100% { transform: scale(1.06); }
  }

  .game-emoji {
    font-size: 52px;
    line-height: 1;
    filter: drop-shadow(0 3px 8px rgba(0,0,0,0.1));
    transition: transform 0.2s;
  }
  .game-card:active .game-emoji { transform: scale(0.9) rotate(-5deg); }

  .game-name {
    font-size: 15px;
    font-weight: 900;
    color: var(--text-dark);
    line-height: 1.3;
  }

  .game-desc {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-mid);
    line-height: 1.4;
  }

  .badge-new {
    position: absolute;
    top: 12px; right: 12px;
    background: linear-gradient(135deg, var(--gold), #FFA500);
    color: #5A3000;
    font-size: 10px;
    font-weight: 900;
    padding: 3px 8px;
    border-radius: 20px;
    box-shadow: 0 2px 6px rgba(255,165,0,0.4);
    letter-spacing: 1px;
  }

  .badge-soon {
    position: absolute;
    top: 12px; right: 12px;
    background: linear-gradient(135deg, #C9A7E8, #9B7EC8);
    color: white;
    font-size: 10px;
    font-weight: 900;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 1px;
    opacity: 0.85;
  }

  /* Coming soon カード */
  .game-card.soon {
    opacity: 0.65;
    filter: grayscale(0.3);
    pointer-events: none;
    cursor: default;
  }

  /* フッター */
  footer {
    text-align: center;
    padding: 32px 20px 20px;
    font-size: 12px;
    color: var(--text-mid);
    opacity: 0.7;
    font-weight: 700;
    letter-spacing: 2px;
  }

  /* キラキラエフェクト */
  .sparkle-overlay {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1000;
  }
  .sp {
    position: absolute;
    font-size: 20px;
    animation: sparkleFloat 1.2s ease-out forwards;
    opacity: 0;
  }
  @keyframes sparkleFloat {
    0%   { opacity: 1; transform: translate(0,0) scale(0.5); }
    60%  { opacity: 1; transform: translate(var(--tx), var(--ty)) scale(1.2); }
    100% { opacity: 0; transform: translate(var(--tx2), var(--ty2)) scale(0.3); }
  }

  /* ロールフロム */
  .game-card { animation: slideIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
  .game-card:nth-child(1) { animation-delay: 0.1s; }
  .game-card:nth-child(2) { animation-delay: 0.2s; }
  .game-card:nth-child(3) { animation-delay: 0.3s; }
  .game-card:nth-child(4) { animation-delay: 0.4s; }
  @keyframes slideIn {
    from { opacity:0; transform:translateY(30px) scale(0.9); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }
</style>
</head>
<body>

<div class="stars-bg" id="starsBg"></div>

<div class="wrapper">
  <header>
    <span class="crown-icon">👑</span>
    <h1>プリンセス<br>ゲームパーク<span>✨ あそびのおしろ ✨</span></h1>
  </header>

  <p class="section-title">あそべるゲーム</p>

  <div class="games-grid">
    <!-- プリンセス2048 -->
    <a class="game-card pink-card" href="./puzzle-2048/index.html" id="card2048">
      <span class="badge-new">NEW✨</span>
      <div class="game-emoji">👑</div>
      <div class="game-name">プリンセス<br>2048</div>
      <div class="game-desc">おひめさまを<br>つなげよう！</div>
    </a>

    <!-- 着せ替え -->
    <a class="game-card purple-card" href="./dress-up/index.html" id="cardDress">
      <span class="badge-new">NEW✨</span>
      <div class="game-emoji">👗</div>
      <div class="game-name">プリンセス<br>きせかえ</div>
      <div class="game-desc">おしゃれに<br>きがえよう！</div>
    </a>

    <!-- Coming Soon -->
    <div class="game-card soon">
      <span class="badge-soon">もうすぐ</span>
      <div class="game-emoji">💎</div>
      <div class="game-name">ほうせき<br>キャッチ</div>
      <div class="game-desc">そらから<br>おちてくるよ</div>
    </div>

    <div class="game-card soon">
      <span class="badge-soon">もうすぐ</span>
      <div class="game-emoji">🩰</div>
      <div class="game-name">ガラスの<br>くつさがし</div>
      <div class="game-desc">おそろいのくつを<br>みつけよう</div>
    </div>
  </div>

  <footer>🌸 みんなのまほうのおしろ 🌸</footer>
</div>

<div class="sparkle-overlay" id="sparkleOverlay"></div>

<script>
/* ── 背景の星を生成 ── */
const bg = document.getElementById('starsBg');
for (let i = 0; i < 24; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    --dur:${2+Math.random()*3}s;
    --delay:${Math.random()*4}s;
    width:${4+Math.random()*6}px;
    height:${4+Math.random()*6}px;
  `;
  bg.appendChild(s);
}

/* ── タップ時のキラキラエフェクト ── */
const overlay = document.getElementById('sparkleOverlay');
const emo = ['✨','💖','⭐','🌟','💫','🌸','💕'];

function spawnSparkles(x, y) {
  for (let i = 0; i < 8; i++) {
    const el = document.createElement('span');
    el.className = 'sp';
    const angle = (360/8)*i + Math.random()*20;
    const r1 = 30 + Math.random()*30;
    const r2 = 60 + Math.random()*60;
    const rad = angle * Math.PI / 180;
    el.textContent = emo[Math.floor(Math.random()*emo.length)];
    el.style.cssText = `
      left:${x}px; top:${y}px;
      --tx:${Math.cos(rad)*r1}px;
      --ty:${Math.sin(rad)*r1}px;
      --tx2:${Math.cos(rad)*r2}px;
      --ty2:${Math.sin(rad)*r2}px;
      animation-delay:${Math.random()*0.15}s;
    `;
    overlay.appendChild(el);
    setTimeout(() => el.remove(), 1400);
  }
}

document.querySelectorAll('.game-card:not(.soon)').forEach(card => {
  card.addEventListener('touchstart', e => {
    const touch = e.touches[0];
    spawnSparkles(touch.clientX, touch.clientY);
    card.classList.add('bounce');
    setTimeout(() => card.classList.remove('bounce'), 400);
  }, {passive: true});
  card.addEventListener('mousedown', e => {
    spawnSparkles(e.clientX, e.clientY);
  });
});
</script>
</body>
</html>
